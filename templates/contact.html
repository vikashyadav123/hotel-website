<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - The Pristine Palace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav>
        <div class="logo">🏰 The Pristine Palace</div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/rooms">Rooms</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <section class="contact-section">
        <h1>Book Your Stay</h1>
        <p>Fill the form and we'll confirm your reservation</p>

        {% if message %}
            <p class="success">{{ message }}</p>
        {% endif %}

        <form method="POST">
            <input type="text" name="name" placeholder="Your Full Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="date" name="checkin" required>
            <input type="date" name="checkout" required>
            <select name="room">
                <option>Deluxe Room - ₹4,999/night</option>
                <option>Palace Suite - ₹9,999/night</option>
                <option>Royal Penthouse - ₹19,999/night</option>
            </select>
            <textarea name="message" placeholder="Special requests..."></textarea>
            <button type="submit" class="btn">Confirm Booking</button>
        </form>
    </section>

    <footer>
        <p>© 2026 The Pristine Palace, Varanasi | <a href="https://www.thepristinepalace.com">www.thepristinepalace.com</a></p>
    </footer>

</body>
</html>
