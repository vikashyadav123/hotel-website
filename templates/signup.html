{% extends 'base.html' %}
{% block title %}Sign Up - The Pristine Palace{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-image">
        <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800" alt="Hotel">
        <div class="auth-image-overlay">
            <h2>⚜ The Pristine Palace</h2>
            <p>Join the royal family</p>
        </div>
    </div>
    <div class="auth-form-side">
        <div class="auth-form-wrap">
            <h1>Create <em>Account</em></h1>
            <p class="auth-sub">Join us for exclusive benefits and easy booking</p>
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" name="name" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn-auth">Create Account <i class="fas fa-arrow-right"></i></button>
            </form>
            <p class="auth-switch">Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>
</section>
{% endblock %}
