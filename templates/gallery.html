{% extends 'base.html' %}
{% block title %}Gallery - The Pristine Palace{% endblock %}
{% block content %}
<section class="page-hero" style="background-image: url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=1600')">
    <div class="page-hero-overlay">
        <p class="section-sub" style="color:#d4af37">Our Property</p>
        <h1>Photo <em>Gallery</em></h1>
    </div>
</section>
<section class="gallery-section">
    <div class="gallery-grid">
        <div class="gallery-item tall"><img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=600" alt="Hotel Exterior"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=600" alt="Deluxe Room"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=600" alt="Suite"></div>
        <div class="gallery-item wide"><img src="https://images.unsplash.com/photo-1571003123894-1f0594d2b5d9?w=800" alt="Pool"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=600" alt="Penthouse"></div>
        <div class="gallery-item tall"><img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600" alt="Restaurant"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=600" alt="Spa"></div>
        <div class="gallery-item wide"><img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=800" alt="Hotel Lobby"></div>
    </div>
</section>
{% endblock %}
