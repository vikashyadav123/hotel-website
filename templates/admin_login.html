<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - The Pristine Palace</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Montserrat',sans-serif; background:#0f0a03; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-box { background:#1a1206; border:1px solid #c9a84c; padding:50px 45px; width:100%; max-width:420px; text-align:center; }
        .login-icon { font-size:2.5rem; margin-bottom:15px; }
        h1 { font-family:'Cormorant Garamond',serif; color:#c9a84c; font-size:2rem; font-weight:300; margin-bottom:5px; }
        .subtitle { color:rgba(255,255,255,0.4); font-size:0.75rem; letter-spacing:3px; text-transform:uppercase; margin-bottom:35px; }
        .flash { background:#f8d7da; color:#721c24; padding:12px; border-radius:3px; margin-bottom:20px; font-size:0.85rem; }
        .form-group { text-align:left; margin-bottom:20px; }
        label { display:block; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:8px; }
        input { width:100%; padding:13px 15px; background:#0f0a03; border:1px solid rgba(201,168,76,0.3); color:#fff; font-family:'Montserrat',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.3s; }
        input:focus { border-color:#c9a84c; }
        button { width:100%; background:#c9a84c; color:#0f0a03; padding:15px; border:none; font-family:'Montserrat',sans-serif; font-size:0.85rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:10px; transition:background 0.3s; }
        button:hover { background:#e8c97a; }
        .warning { color:rgba(255,255,255,0.3); font-size:0.72rem; margin-top:20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-icon">🔐</div>
        <h1>Admin Panel</h1>
        <p class="subtitle">The Pristine Palace</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter admin username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit">Login to Admin</button>
        </form>
        <p class="warning">⚠ Restricted area. Authorized personnel only.</p>
    </div>
</body>
</html>
